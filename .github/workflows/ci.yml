name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: Lint
        run: ruff check src tests

      - name: Tests
        run: pytest --cov=src/scribe --cov-report=term --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
